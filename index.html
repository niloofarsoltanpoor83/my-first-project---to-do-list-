<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>To-Do List</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    text-align: center;
    margin-top: 50px;
    transition: 0.3s;
}
body.dark {
    background: #222;
    color: white;
}

h1{
    color: inherit;
}

input{
    padding:10px;
    width:250px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    padding:10px;
    margin-left:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:all 0.3s ease;
}
    button:hover{
    transform: translateY(-2px);
    box-shadow: 0 5px 12px rgba(0,0,0,0.2);
}

.add{
    background:mediumseagreen;
    color:white;
}

.darkBtn{
    background:#444;
    color:white;
}
.toolbar{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
}
ul{
    list-style:none;
    padding:0;
}

li{
    background:white;
    width:340px;
    margin:10px auto;
    padding:10px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition: all 0.3s ease;
box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}
li:hover{
    transform: translateY(-4px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}
    @keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(-15px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.newTask{
    animation:fadeIn .4s ease;
}
body.dark li{
    background:#333;
}

.completed{
    text-decoration:line-through;
    color:gray;
}

.edit{
    background:mediumpurple;
    color:white;
    padding:7px 15px;
    border-radius:8px;
}

.delete{
    background:red;
    color:white;
    padding:7px 12px;
    border-radius:8px;
}
    .buttonBox{display:flex;
              gap:8px;
              }
    @media (max-width: 768px){
    .toolbar{
        flex-direction: column;
    }
    input,
    select,
    button{
        width:90%;
        margin:5px 0;
    }
    li{
        width:90%;
        display:flex;
        flex-direction:column;
        gap:10px;
    }
}
</style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"> 
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>

<body>
<i class="fa-solid fa-heart"></i>
    
<h1>My To-Do List</h1>
<div class="toolbar">
    
<input id="taskInput" placeholder="Write task...">
    <select id="priority">
    <option value="High">🔴 High</option>
    <option value="Medium">🟡 Medium</option>
    <option value="Low">🟢 Low</option>
</select>

<input type="date" id="dueDate">
<button class="add" onclick="addTask()">
    <i class="fa-solid fa-plus"></i> Add
</button>
<button class="darkBtn" onclick="toggleDarkMode()">
    <i class="fa-solid fa-moon"></i> Dark Mode
</button>

    <input
        type="text"
        id="searchInput"
        placeholder="Search task..."
        onkeyup="searchTask()">
 <button onclick="showAll()">
    <i class="fa-solid fa-list"></i> All
</button>
    <button onclick="showActive()">
    <i class="fa-solid fa-hourglass-half"></i> Active
</button>
     <button onclick="showCompleted()">
    <i class="fa-solid fa-check"></i> Completed
</button>
   <button onclick="clearCompleted()">
    <i class="fa-solid fa-broom"></i> Clear Completed
</button>
    <button onclick="deleteAllTasks()">
    <i class="fa-solid fa-trash"></i> Delete All
</button>
</div>
    <h3>Progress</h3>

<progress id="progressBar" value="0" max="100"></progress>

<p id="progressText">0%</p>
<p id="taskCount">Tasks: 0</p>
<ul id="taskList"></ul>
<script>
    let celebrated = false;
function toggleDarkMode(){

    document.body.classList.toggle("dark");

    if(document.body.classList.contains("dark")){
        localStorage.setItem("darkMode","on");
       alert(localStorage.getItem("darkMode")); 
    }else{
        localStorage.setItem("darkMode","off");
        alert(localStorage.getItem("darkMode"));
    }

}
function saveTasks(){

    let tasks = [];

    document.querySelectorAll("#taskList li").forEach(function(li){

        let span = li.querySelector("span");
        let priority = li.querySelectorAll("small")[0].textContent;
        let dueDate = li.querySelectorAll("small")[1].textContent;

        tasks.push({

            text: span.textContent,
            completed: span.classList.contains("completed"),
            priority: priority,
            dueDate: dueDate

        });

    });

    localStorage.setItem("tasks", JSON.stringify(tasks));

}
function updateTaskCount() {
    let count = document.querySelectorAll("#taskList li").length;
    document.getElementById("taskCount").textContent = "Tasks: " + count;
}
function updateProgress(){

    let tasks = document.querySelectorAll("#taskList li");
    let completed = document.querySelectorAll("#taskList .completed");

    let percent = 0;

    if(tasks.length > 0){
        percent = Math.round((completed.length / tasks.length) * 100);
    }

    document.getElementById("progressBar").value = percent;
    document.getElementById("progressText").textContent = percent + "%";
if (percent === 100 && tasks.length > 0 && !celebrated) {
    celebrated = true;

    setTimeout(() => {
        confetti({
            particleCount: 150,
            spread: 90,
            origin: { y: 0.6 }
        });
    }, 100);
}
                                                        
    if(percent<100){celebrated = false;}
}    
    
function addTask(){

    let input=document.getElementById("taskInput");
    let task=input.value.trim();
let priority = document.getElementById("priority").value;
let dueDate = document.getElementById("dueDate").value;
    if(task==="") return;

    let li=document.createElement("li");
    li.classList.add("newTask");

    let span=document.createElement("span");
    span.textContent=task;
let date = document.createElement("small");
date.textContent = new Date().toLocaleDateString();
date.style.color = "gray";
date.style.marginLeft = "10px";
    let priorityText = document.createElement("small");
priorityText.textContent = priority;
priorityText.style.fontWeight = "bold";

if(priority === "High"){
    priorityText.style.color = "red";
}
else if(priority === "Medium"){
    priorityText.style.color = "orange";
}
else{
    priorityText.style.color = "green";
}
    let dueDateText = document.createElement("small");

if(dueDate !== ""){
    dueDateText.textContent = "📅 Due: " + dueDate;
}else{
    dueDateText.textContent = "📅 No due date";
}

dueDateText.style.color = "gray";
    span.onclick=function(){
        span.classList.toggle("completed");
        saveTasks();
        updateProgress();
    };

    let editBtn=document.createElement("button");
    
    editBtn.className="edit";

    
    let textBox = document.createElement("div");

textBox.appendChild(span);
textBox.appendChild(document.createElement("br"));

textBox.appendChild(priorityText);
textBox.appendChild(document.createElement("br"));

textBox.appendChild(dueDateText);
textBox.appendChild(document.createElement("br"));

textBox.appendChild(date);
li.appendChild(textBox);
    let buttonBox = document.createElement("div");
        buttonBox.className="buttonBox";
buttonBox.appendChild(editBtn);
buttonBox.appendChild(deleteBtn);
li.appendChild(buttonBox);
    document.getElementById("taskList").appendChild(li);

    input.value="";

    saveTasks();
updateTaskCount();
    updateProgress();
}

document.getElementById("taskInput").addEventListener("keypress",function(e){

    if(e.key==="Enter"){
        addTask();
    }

});//

window.onload = function(){

    let savedTasks = JSON.parse(localStorage.getItem("tasks")) || [];

    savedTasks.forEach(function(task){

        createTask(
            task.text,
            task.priority,
            task.dueDate,
            task.completed
        );

    });

    if(localStorage.getItem("darkMode") === "on"){
        document.body.classList.add("dark");
    }

    updateTaskCount();
    updateProgress();
};
    editBtn.onclick = function(e){
        e.stopPropagation();

        let newTask = prompt("Edit task", span.textContent);

        if(newTask && newTask.trim() !== ""){
            span.textContent = newTask.trim();
            saveTasks();
        }
    };

    deleteBtn.onclick = function(e){
        e.stopPropagation();

        if(confirm("Delete this task?")){
            li.remove();
            saveTasks();
            updateTaskCount();
            updateProgress();
        }
    };

});
if(localStorage.getItem("darkMode") === "on"){
    document.body.classList.add("dark");
}
    
updateTaskCount();
    updateProgress();
};
 function showAll(){

    let tasks = document.querySelectorAll("#taskList li");

    tasks.forEach(function(task){

        task.style.display = "flex";

    });

}



function showActive(){

    let tasks = document.querySelectorAll("#taskList li");

    tasks.forEach(function(task){

        let span = task.querySelector("span");

        if(!span.classList.contains("completed")){
            task.style.display = "flex";
        }else{
            task.style.display = "none";
        }

    });

}



function showCompleted(){

    let tasks = document.querySelectorAll("#taskList li");

    tasks.forEach(function(task){

        let span = task.querySelector("span");

        if(span.classList.contains("completed")){
            task.style.display = "flex";
        }else{
            task.style.display = "none";
        }

    });

}
function searchTask(){
    let search = document.getElementById("searchInput").value.toLowerCase();

let tasks = document.querySelectorAll("#taskList li");

tasks.forEach(function(task){

    let text = task.querySelector("span").textContent.toLowerCase();

    if(text.includes(search)){
        task.style.display = "flex";
    }else{
        task.style.display = "none";
    }

});
                  }
    function clearCompleted(){

    let tasks = document.querySelectorAll("#taskList li");

    tasks.forEach(function(task){

        let span = task.querySelector("span");

        if(span.classList.contains("completed")){
            task.remove();
        }
    });
    saveTasks();
    updateTaskCount();
        updateProgress();
}
   
function deleteAllTasks(){


    if(confirm("Are you sure you want to delete all tasks?")){
        document.getElementById("taskList").innerHTML = "";
        saveTasks();
        updateTaskCount();
        updateProgress();
    }
}
      
</script>

</body>
</html>
