<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do List</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            text-align: center;
            margin-top: 50px;
        }

        h1 {
            color: #333;
        }

        input {
            padding: 10px;
            width: 250px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 5px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            background: white;
            margin: 10px auto;
            width: 300px;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>

<body>

    <h1>My To-Do List</h1>

    <input id="taskInput" placeholder="Write a task...">
    <button onclick="addTask()">Add</button>

    <ul id="taskList"></ul>

    <script>
        function addTask() {
            let input = document.getElementById("taskInput");
            let task = input.value.trim();

            if (task === "") return;

            let li = document.createElement("li");
            li.textContent = task;

            li.addEventListener("click", function () {
                this.classList.toggle("completed");
            });

            document.getElementById("taskList").appendChild(li);

            input.value = "";
        }
    </script>

</body>
</html>
