<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>To-Do List</title>

<style>
body {
    
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    text-align: center;
    margin-top: 50px;
    transition: 0.3s;
}

body.dark {
    background: #222;
    color: white;
}

h1{
    color: inherit;
}

input{
    padding:10px;
    width:250px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    padding:10px;
    margin-left:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.add{
    background:mediumseagreen;
    color:white;
}

.darkBtn{
    background:#444;
    color:white;
}

ul{
    list-style:none;
    padding:0;
}

li{
    background:white;
    width:340px;
    margin:10px auto;
    padding:10px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

body.dark li{
    background:#333;
}

.completed{
    text-decoration:line-through;
    color:gray;
}

.edit{
    background:mediumpurple;
    color:white;
    padding:7px 15px;
    border-radius:8px;
}

.delete{
    background:red;
    color:white;
    padding:7px 12px;
    border-radius:8px;
}
</style>
</head>

<body>

<h1>My To-Do List</h1>

<input id="taskInput" placeholder="Write task...">

<button class="add" onclick="addTask()">Add</button>

<button class="darkBtn" onclick="toggleDarkMode()">🌙 Dark Mode</button>
    
<p id="taskCount">Tasks: 0</p>
<ul id="taskList"></ul>

<script>
function toggleDarkMode(){

    document.body.classList.toggle("dark");

    if(document.body.classList.contains("dark")){
        localStorage.setItem("darkMode","on");
    }else{
        localStorage.setItem("darkMode","off");
    }

}
function saveTasks(){
    localStorage.setItem("tasks",document.getElementById("taskList").innerHTML);
}
function updateTaskCount() {
    let count = document.querySelectorAll("#taskList li").length;
    document.getElementById("taskCount").textContent = "Tasks: " + count;
}
function addTask(){

    let input=document.getElementById("taskInput");
    let task=input.value.trim();

    if(task==="") return;

    let li=document.createElement("li");

    let span=document.createElement("span");
    span.textContent=task;
let date = document.createElement("small");
date.textContent = new Date().toLocaleDateString();
date.style.color = "gray";
date.style.marginLeft = "10px";
    span.onclick=function(){
        span.classList.toggle("completed");
        saveTasks();
    };

    let editBtn=document.createElement("button");
    editBtn.textContent="Edit";
    editBtn.className="edit";

    editBtn.onclick=function(e){

        e.stopPropagation();

        let newTask=prompt("Edit task",span.textContent);

        if(newTask && newTask.trim()!==""){
            span.textContent=newTask.trim();
            saveTasks();
        }

    };

    let deleteBtn=document.createElement("button");
    deleteBtn.textContent="X";
    deleteBtn.className="delete";

    deleteBtn.onclick=function(e){

        e.stopPropagation();

        li.remove();

        saveTasks();
updateTaskCount();
    };

    let textBox = document.createElement("div");

textBox.appendChild(span);
textBox.appendChild(document.createElement("br"));
textBox.appendChild(date);

li.appendChild(textBox);
    li.appendChild(editBtn);
    li.appendChild(deleteBtn);

    document.getElementById("taskList").appendChild(li);

    input.value="";

    saveTasks();
updateTaskCount();
}

document.getElementById("taskInput").addEventListener("keypress",function(e){

    if(e.key==="Enter"){
        addTask();
    }

});

window.onload=function(){

    document.getElementById("taskList").innerHTML=
    localStorage.getItem("tasks") || "";
if(localStorage.getItem("darkMode") === "on"){
    document.body.classList.add("dark");
}
    
updateTaskCount();
};

</script>

</body>
</html>
