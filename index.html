<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>To-Do List</title>

<style>
    body {
        font-family: Arial;
        background: #f4f6f9;
        text-align: center;
        margin-top: 50px;
    }

    input {
        padding: 10px;
        width: 250px;
    }

    button {
        padding: 10px;
        margin-left: 5px;
        cursor: pointer;
    }

    ul {
        padding: 0;
        list-style: none;
    }

    li {
        background: white;
        margin: 10px auto;
        width: 320px;
        padding: 10px;
        display: flex;
        justify-content: space-between;
        border-radius: 8px;
        cursor: pointer;
    }

    .completed {
        text-decoration: line-through;
        color: gray;
    }

    .delete {
        background: red;
        color: white;
        border: none;
        border-radius: 5px;
        padding: 5px 8px;
        cursor: pointer;
    }
</style>
</head>

<body>

<h1>My To-Do List</h1>

<input id="taskInput" placeholder="Write task...">
<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>

<script>
function addTask() {
    let input = document.getElementById("taskInput");
    let task = input.value.trim();

    if (!task) return;

    let li = document.createElement("li");

    let span = document.createElement("span");
    span.textContent = task;

    span.addEventListener("click", function () {
        span.classList.toggle("completed");
    });

    let btn = document.createElement("button");
    btn.textContent = "X";
    btn.className = "delete";

    btn.addEventListener("click", function (e) {
        e.stopPropagation();
        li.remove();
    });

    li.appendChild(span);
    li.appendChild(btn);

    document.getElementById("taskList").appendChild(li);

    input.value = "";
}
</script>

</body>
</html>
